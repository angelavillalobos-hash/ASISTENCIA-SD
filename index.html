<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Asistencia SD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

.topbar{display:flex;align-items:center;gap:20px;padding:12px 24px;background:#161b22;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:100;}
.badge-title{background:#f5c518;color:#000;font-weight:800;font-size:14px;padding:6px 16px;border-radius:8px;}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:#8b949e;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#3fb950;}.dot-err{background:#f85149;}.dot-load{background:#f5c518;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s;}
.btn:hover{background:#30363d;}
.ts{font-size:11px;color:#484f58;font-family:monospace;}
.date-select{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:monospace;}
.hist-badge{background:rgba(245,197,24,.15);color:#f5c518;border:1px solid rgba(245,197,24,.3);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;}

.main{padding:24px 28px;max-width:1300px;margin:0 auto;}
.page-title{text-align:center;margin-bottom:24px;}
.page-title h1{font-size:28px;font-weight:700;}
.page-title p{font-size:13px;color:#8b949e;margin-top:4px;}

.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{padding:7px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#161b22;color:#8b949e;transition:all .2s;}
.tab.active{background:#f5c518;color:#000;border-color:#f5c518;}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px 22px;}
.kpi-lbl{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.kpi-val{font-size:36px;font-weight:700;line-height:1;}
.kpi-sub{font-size:12px;margin-top:6px;font-weight:600;}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px 22px;}
.card-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
.legend{display:flex;gap:16px;margin-bottom:12px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#8b949e;}
.leg-box{width:12px;height:12px;border-radius:3px;}

/* BARRAS VERTICALES AGRUPADAS */
.bar-chart-wrap{overflow-x:auto;}
.bar-area{display:flex;align-items:flex-end;gap:6px;height:200px;min-width:0;padding-top:8px;}
.bar-grp{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:44px;}
.bars-pair{display:flex;align-items:flex-end;gap:3px;}
.bar{border-radius:4px 4px 0 0;min-height:2px;}
.bar-r{background:#58a6ff;}
.bar-s{background:#1c2333;border:1px solid #30363d;}
.bar-num{font-size:10px;color:#8b949e;font-family:monospace;text-align:center;}
.bar-lbl{font-size:9px;color:#484f58;text-align:center;line-height:1.3;white-space:nowrap;}

/* AUSENTISMO HORIZONTAL */
.ausen-list{display:flex;flex-direction:column;gap:9px;}
.ausen-row{display:flex;align-items:center;gap:10px;}
.ausen-lbl{font-size:11px;color:#8b949e;width:70px;text-align:right;flex-shrink:0;}
.ausen-track{flex:1;background:#21262d;border-radius:4px;height:24px;overflow:hidden;}
.ausen-bar{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.9);transition:width .7s ease;min-width:2px;}
.a-g{background:#238636;}.a-o{background:#9e6a03;}.a-r{background:#da3633;}
.ausen-pct{font-size:11px;font-family:monospace;width:40px;flex-shrink:0;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;border-bottom:1px solid #21262d;text-align:left;white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid #0d1117;font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.eb{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:monospace;}
.e1{background:rgba(245,197,24,.12);color:#f5c518;border:1px solid rgba(245,197,24,.2);}
.e2{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.pp{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:monospace;}
.pg{background:rgba(63,185,80,.18);color:#3fb950;}
.po{background:rgba(227,179,65,.18);color:#e3b341;}
.pr{background:rgba(248,81,73,.18);color:#f85149;}
.obs{color:#8b949e;font-size:12px;}
.mn{font-family:monospace;}

.loading-screen{display:flex;align-items:center;justify-content:center;height:60vh;gap:10px;color:#8b949e;font-size:14px;}
.spin{width:18px;height:18px;border:2px solid #30363d;border-top-color:#f5c518;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:800px){.kpi-grid{grid-template-columns:1fr 1fr;}.charts-row{grid-template-columns:1fr;}.main{padding:12px;}}
</style>
</head>
<body>

<div class="topbar">
  <span class="badge-title">Asistencia SD</span>
  <span class="status">
    <span class="dot dot-load" id="sDot"></span>
    <span id="sTxt">Cargando...</span>
  </span>
  <div class="topbar-right">
    <span class="ts" id="ts"></span>
    <select class="date-select" id="dateSelect" onchange="loadHistorico(this.value)" title="Ver día anterior">
      <option value="hoy">📅 Hoy</option>
    </select>
    <button class="btn" onclick="window.open('https://docs.google.com/spreadsheets/d/1gvujSKMIj3Ilt46fdAOxGT05gtnLvsDBCKFMJ8bWbbI','_blank')">📋 Ver planilla</button>
    <button class="btn" onclick="fetchData(true)">↻ Actualizar</button>
    <button class="btn" id="dlBtn" onclick="descargar()">⬇ Descargar</button>
  </div>
</div>

<div id="root" class="main">
  <div class="loading-screen"><div class="spin"></div>Conectando con Google Sheets...</div>
</div>

<script>
const SHEET='1gvujSKMIj3Ilt46fdAOxGT05gtnLvsDBCKFMJ8bWbbI';
let filtro='ambos', timer=null, D=null;

function pf(v){const s=(v||'').replace(/"/g,'').replace(',','.').replace('%','').replace(/#DIV.*/,'0').trim();const n=parseFloat(s);return isNaN(n)?0:n;}
function pi(v){const n=parseInt((v||'').replace(/[^0-9\-]/g,''));return isNaN(n)?0:n;}

function parseCsv(txt){
  return txt.split(/\r?\n/).map(line=>{
    const row=[];let cur='',q=false;
    for(const c of line){if(c==='"'){q=!q;}else if(c===','&&!q){row.push(cur.trim());cur='';}else cur+=c;}
    row.push(cur.trim());return row;
  });
}

function parseDot(rows){
  let fecha='';
  for(let i=0;i<Math.min(4,rows.length);i++){
    const c=(rows[i][0]||'').trim();
    if(/\d{1,2}\/\d{1,2}\/\d{4}/.test(c)){fecha=c;break;}
  }
  // fila 0 = fecha, fila 1 = header "Item,...", filas 2+ = datos
  let start=2; // por defecto
  for(let i=0;i<Math.min(6,rows.length);i++){
    if((rows[i][0]||'').toLowerCase().trim()==='item'){start=i+1;break;}
  }
  const items=[];let total=null;
  for(let i=start;i<rows.length;i++){
    const r=rows[i];
    const item=(r[0]||'').replace(/"/g,'').trim();
    if(!item)continue;
    if(item.toLowerCase().includes('total')){
      total={capReal:pi(r[1]),capSolic:pi(r[2]),ausentes:Math.abs(pi(r[3])),ausentismo:(r[4]||'').replace(/"/g,'').trim()};
      continue;
    }
    items.push({item,capReal:pi(r[1]),capSolic:pi(r[2]),ausentes:Math.abs(pi(r[3])),ausentismo:(r[4]||'').replace(/"/g,'').trim(),obs:(r[5]||'').replace(/"/g,'').trim()});
  }
  if(!total){
    const cr=items.reduce((a,b)=>a+b.capReal,0),cs=items.reduce((a,b)=>a+b.capSolic,0),au=items.reduce((a,b)=>a+b.ausentes,0);
    total={capReal:cr,capSolic:cs,ausentes:au,ausentismo:cs>0?(au/cs*100).toFixed(1).replace('.',',')+' %':'0,0 %'};
  }
  return{fecha,items,total};
}

async function fetchCsv(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET}/export?format=csv&gid=${gid}`;
  const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
  const t=await r.text();if(t.includes('<!DOCTYPE'))throw new Error('No público');
  return parseCsv(t);
}

// ── HISTORIAL LOCAL ─────────────────────────────────────────────────
const HIST_KEY = 'dotacion_hist_v1';
let viewingDate = 'hoy'; // 'hoy' o 'DD/MM/YYYY'

function saveToHistory(data){
  try{
    const fecha = data.srm1?.fecha || data.srm2?.fecha;
    if(!fecha) return;
    const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'{}');
    hist[fecha] = {srm1: data.srm1, srm2: data.srm2, savedAt: new Date().toISOString()};
    // Guardar máximo 60 días
    const keys = Object.keys(hist).sort((a,b)=>{
      const [da,ma,ya]=a.split('/'), [db,mb,yb]=b.split('/');
      return new Date(yb,mb-1,db)-new Date(ya,ma-1,da);
    });
    if(keys.length>60) keys.slice(60).forEach(k=>delete hist[k]);
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
    updateDateSelect(fecha);
  }catch(e){}
}

function updateDateSelect(fechaHoy){
  try{
    const sel = document.getElementById('dateSelect');
    if(!sel) return;
    const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'{}');
    const keys = Object.keys(hist).sort((a,b)=>{
      const [da,ma,ya]=a.split('/'), [db,mb,yb]=b.split('/');
      return new Date(yb,mb-1,db)-new Date(ya,ma-1,da);
    });
    // Reconstruir opciones
    sel.innerHTML = '<option value="hoy">📅 Hoy ('+fechaHoy+')</option>';
    keys.forEach(k=>{
      if(k===fechaHoy) return; // hoy ya está arriba
      const opt=document.createElement('option');
      opt.value=k; opt.textContent='📂 '+k;
      sel.appendChild(opt);
    });
    sel.value = viewingDate==='hoy'?'hoy':viewingDate;
  }catch(e){}
}

function loadHistorico(val){
  viewingDate = val;
  if(val==='hoy'){
    if(D) render();
    return;
  }
  try{
    const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'{}');
    if(hist[val]){
      const snap = hist[val];
      // Mostrar banner de histórico
      D = {srm1: snap.srm1, srm2: snap.srm2};
      setStatus('err', '📂 Histórico · '+val);
      render();
    }
  }catch(e){}
}

async function fetchData(){
  setStatus('load','Actualizando...');
  try{
    const [r1,r2]=await Promise.all([fetchCsv('0'),fetchCsv('631295191')]);
    D={srm1:parseDot(r1),srm2:parseDot(r2)};
    setStatus('ok','Datos en vivo · Google Sheets');
    document.getElementById('ts').textContent='Act. '+new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    saveToHistory(D);
  }catch(e){
    D=staticData();setStatus('err','Datos locales (sin conexión)');
  }
  render();
  if(timer)clearTimeout(timer);timer=setTimeout(fetchData,60000);
}

function setStatus(t,m){
  document.getElementById('sDot').className='dot '+(t==='ok'?'dot-ok':t==='err'?'dot-err':'dot-load');
  document.getElementById('sTxt').textContent=m;
}

function staticData(){
  return{
    srm1:{fecha:'14/05/2026',items:[
      {item:'Team Leader',capReal:1,capSolic:1,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'Reps 2 (PS)',capReal:2,capSolic:3,ausentes:1,ausentismo:'33,3%',obs:'01 PS CON VACACIONES'},
      {item:'RTS',capReal:2,capSolic:2,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'FT Meli',capReal:16,capSolic:17,ausentes:1,ausentismo:'5,9%',obs:'Nicole Dueñas – Licencia médica'},
      {item:'FT EST',capReal:15,capSolic:16,ausentes:1,ausentismo:'6,3%',obs:'Ausencia injustificada Martín Suazo'},
      {item:'PT EST',capReal:6,capSolic:6,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'PT Meli',capReal:1,capSolic:1,ausentes:0,ausentismo:'0,0%',obs:''},
    ],total:{capReal:38,capSolic:40,ausentes:2,ausentismo:'5,0%'}},
    srm2:{fecha:'14/05/2026',items:[
      {item:'Team Leader',capReal:1,capSolic:1,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'Reps 2 (PS)',capReal:1,capSolic:1,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'RTS',capReal:0,capSolic:2,ausentes:2,ausentismo:'100,0%',obs:'Sin cobertura'},
      {item:'FT Meli',capReal:7,capSolic:7,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'FT EST',capReal:5,capSolic:5,ausentes:0,ausentismo:'0,0%',obs:''},
      {item:'PT EST',capReal:34,capSolic:35,ausentes:1,ausentismo:'2,9%',obs:'Antonia Barbolan'},
      {item:'PT Meli',capReal:0,capSolic:0,ausentes:0,ausentismo:'—',obs:''},
    ],total:{capReal:46,capSolic:47,ausentes:1,ausentismo:'2,1%'}}
  };
}

function render(){
  if(!D)return;
  const s1=D.srm1,s2=D.srm2,f=filtro;
  let items=[];
  if(f==='ambos'||f==='srm1')s1.items.forEach(i=>items.push({...i,est:'SRM1'}));
  if(f==='ambos'||f==='srm2')s2.items.forEach(i=>items.push({...i,est:'SRM2'}));

  let cr=0,cs=0,au=0;
  if(f==='ambos'||f==='srm1'){cr+=s1.total.capReal;cs+=s1.total.capSolic;au+=s1.total.ausentes;}
  if(f==='ambos'||f==='srm2'){cr+=s2.total.capReal;cs+=s2.total.capSolic;au+=s2.total.ausentes;}
  const cob=cs>0?Math.round(cr/cs*100):100;
  const auPct=cs>0?(au/cs*100).toFixed(1):0;
  const fecha=s1.fecha||s2.fecha||'';

  const maxV=Math.max(...items.map(i=>Math.max(i.capReal,i.capSolic)),1);
  const H=160;

  document.getElementById('root').innerHTML=`
  <div class="page-title">
    <h1>${fmtFecha(fecha)}</h1>
    <p>Reporte diario de dotación</p>
  </div>

  <div class="tabs">
    <div class="tab${f==='ambos'?' active':''}" onclick="setF('ambos')">SRM1 + SRM2</div>
    <div class="tab${f==='srm1'?' active':''}" onclick="setF('srm1')">SRM1</div>
    <div class="tab${f==='srm2'?' active':''}" onclick="setF('srm2')">SRM2</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi" style="border-top:3px solid #58a6ff">
      <div class="kpi-lbl">Cap. Real</div>
      <div class="kpi-val" style="color:#58a6ff">${cr}</div>
      <div class="kpi-sub" style="color:#8b949e">presentes</div>
    </div>
    <div class="kpi" style="border-top:3px solid #8b949e">
      <div class="kpi-lbl">Cap. Solicitada</div>
      <div class="kpi-val" style="color:#e6edf3">${cs}</div>
      <div class="kpi-sub" style="color:#8b949e">requeridos</div>
    </div>
    <div class="kpi" style="border-top:3px solid ${au>0?'#f85149':'#3fb950'}">
      <div class="kpi-lbl">Ausentes</div>
      <div class="kpi-val" style="color:${au>0?'#f85149':'#3fb950'}">${au}</div>
      <div class="kpi-sub" style="color:${au>0?'#e3b341':'#3fb950'}">${auPct}% ausentismo</div>
    </div>
    <div class="kpi" style="border-top:3px solid ${cob>=95?'#3fb950':cob>=85?'#f5c518':'#f85149'}">
      <div class="kpi-lbl">Cobertura</div>
      <div class="kpi-val" style="color:${cob>=95?'#3fb950':cob>=85?'#f5c518':'#f85149'}">${cob}%</div>
      <div class="kpi-sub" style="color:${cob>=100?'#3fb950':'#e3b341'}">${cob>=100?'Completa':'Con faltantes'}</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Capacidad real vs. solicitada</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-box" style="background:#58a6ff"></div>Cap. real</div>
        <div class="leg-item"><div class="leg-box" style="background:#1c2333;border:1px solid #30363d"></div>Cap. solicitada</div>
      </div>
      <div class="bar-chart-wrap">
        <div class="bar-area">
          ${items.map(it=>{
            const hr=Math.max(Math.round(it.capReal/maxV*H),2);
            const hs=Math.max(Math.round(it.capSolic/maxV*H),2);
            const lbl=it.item.replace('Reps 2 (PS)','Reps 2').replace('Team Leader','T.Leader');
            return `<div class="bar-grp">
              <div class="bars-pair">
                <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                  <span class="bar-num">${it.capReal}</span>
                  <div class="bar bar-r" style="height:${hr}px;width:18px"></div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
                  <span class="bar-num">${it.capSolic}</span>
                  <div class="bar bar-s" style="height:${hs}px;width:18px"></div>
                </div>
              </div>
              <div class="bar-lbl">${lbl}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Ausentismo por ítem (%)</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-box a-g" style="border-radius:3px"></div>0%</div>
        <div class="leg-item"><div class="leg-box a-o" style="border-radius:3px"></div>&lt; 10%</div>
        <div class="leg-item"><div class="leg-box a-r" style="border-radius:3px"></div>≥ 10%</div>
      </div>
      <div class="ausen-list">
        ${items.map(it=>{
          const p=pf(it.ausentismo);
          const cls=p===0?'a-g':p<10?'a-o':'a-r';
          const w=Math.min(p,100);
          const lbl=it.ausentismo==='—'?'—':p.toFixed(1)+'%';
          const lbl2=it.item.replace('Reps 2 (PS)','Reps 2').replace('Team Leader','T.Leader');
          return `<div class="ausen-row">
            <div class="ausen-lbl">${lbl2}</div>
            <div class="ausen-track">
              <div class="ausen-bar ${cls}" style="width:${Math.max(w,w===0?100:w)}%;${w===0?'justify-content:flex-start;padding-left:6px;':''}">
                ${lbl}
              </div>
            </div>
            <div class="ausen-pct">${lbl}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Detalle por estación</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Estación</th><th>Ítem</th><th>Cap. Real</th><th>Cap. Solic.</th><th>Ausentes</th><th>Ausentismo</th><th>Observaciones</th></tr>
        </thead>
        <tbody>
          ${items.map(it=>{
            const p=pf(it.ausentismo);
            const pcls=(it.ausentismo==='—'||p===0)?'pg':p<10?'po':'pr';
            const pstr=it.ausentismo==='—'?'—':p.toFixed(1)+'%';
            return `<tr>
              <td><span class="eb ${it.est==='SRM1'?'e1':'e2'}">${it.est}</span></td>
              <td><strong>${it.item}</strong></td>
              <td class="mn">${it.capReal}</td>
              <td class="mn">${it.capSolic}</td>
              <td class="mn">${it.ausentes}</td>
              <td><span class="pp ${pcls}">${pstr}</span></td>
              <td class="obs">${it.obs||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function setF(f){filtro=f;render();}

function fmtFecha(f){
  if(!f||!f.includes('/'))return f||'—';
  const [d,m,y]=f.split('/');
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  try{const dt=new Date(+y,+m-1,+d);return`${dias[dt.getDay()]} ${+d} De ${meses[+m-1]} ${y}`;}catch{return f;}
}

async function descargar(){
  const btn=document.getElementById('dlBtn');
  btn.disabled=true;btn.textContent='...';
  try{
    if(!window.html2canvas){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const c=await html2canvas(document.body,{backgroundColor:'#0d1117',scale:2,useCORS:true,logging:false});
    const a=document.createElement('a');a.download=`dotacion_${new Date().toISOString().slice(0,10)}.png`;a.href=c.toDataURL('image/png',1.0);a.click();
  }catch(e){alert('Error: '+e.message);}
  btn.disabled=false;btn.textContent='⬇ Descargar';
}

fetchData();
</script>
